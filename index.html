<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Escolar - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            display: flex;
            width: 900px;
            height: 550px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }
        
        .left-panel {
            flex: 1;
            background: linear-gradient(to bottom right, #4776E6, #8E54E9);
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .left-panel::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            top: -100px;
            left: -100px;
        }
        
        .left-panel::after {
            content: "";
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            bottom: -80px;
            right: -80px;
        }
        
        .welcome-text h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            position: relative;
            z-index: 2;
        }
        
        .welcome-text p {
            font-size: 1.1rem;
            line-height: 1.6;
            opacity: 0.9;
            position: relative;
            z-index: 2;
        }
        
        .right-panel {
            flex: 1;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .form-container {
            position: relative;
            width: 100%;
        }
        
        .form {
            transition: transform 0.5s ease-in-out;
        }
        
        .form-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 1.8rem;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            border-color: #4776E6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(71, 118, 230, 0.2);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-login {
            background: linear-gradient(to right, #4776E6, #8E54E9);
            color: white;
            margin-top: 10px;
        }
        
        .btn-register {
            background: linear-gradient(to right, #4CAF50, #2E7D32);
            color: white;
            margin-top: 10px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 15px rgba(0, 0, 0, 0.2);
        }
        
        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .toggle-form a {
            color: #4776E6;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .toggle-form a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            font-weight: 500;
            min-height: 20px;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
        }
        
        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 3px solid #4776E6;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="welcome-text">
                <h1>Bem-vindo ao Chat Escolar</h1>
                <p>Conecte-se com colegas e professores em um ambiente seguro e colaborativo. Compartilhe conhecimento e aprenda juntos!</p>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="form-container">
                <!-- Formulário de Login -->
                <form id="loginForm" class="form">
                    <h2 class="form-title">Entrar na Plataforma</h2>
                    
                    <div class="input-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="seu.email@escola.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="loginPassword">Senha</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-login">Entrar</button>
                    
                    <div class="toggle-form">
                        Não tem uma conta? 
                        <a id="showRegister">Registre-se agora</a>
                    </div>
                    
                    <div id="loginError" class="error-message"></div>
                    <div id="loginLoading" class="loading">
                        <div class="spinner"></div>
                        <p>Entrando...</p>
                    </div>
                </form>
                
                <!-- Formulário de Registro -->
                <form id="registerForm" class="form hidden">
                    <h2 class="form-title">Criar Conta</h2>
                    
                    <div class="input-group">
                        <label for="registerName">Nome Completo</label>
                        <input type="text" id="registerName" placeholder="Seu nome completo" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="registerEmail">Email Escolar</label>
                        <input type="email" id="registerEmail" placeholder="seu.email@escola.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="registerPassword">Senha</label>
                        <input type="password" id="registerPassword" placeholder="••••••••" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="registerConfirmPassword">Confirmar Senha</label>
                        <input type="password" id="registerConfirmPassword" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-register">Criar Conta</button>
                    
                    <div class="toggle-form">
                        Já tem uma conta? 
                        <a id="showLogin">Faça login</a>
                    </div>
                    
                    <div id="registerError" class="error-message"></div>
                    <div id="registerLoading" class="loading">
                        <div class="spinner"></div>
                        <p>Registrando...</p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
                document.addEventListener('DOMContentLoaded', function() {
                const loginForm = document.getElementById('loginForm');
                const registerForm = document.getElementById('registerForm');
                const showRegisterLink = document.getElementById('showRegister');
                const showLoginLink = document.getElementById('showLogin');
                const loginError = document.getElementById('loginError');
                const registerError = document.getElementById('registerError');
                const loginLoading = document.getElementById('loginLoading');
                const registerLoading = document.getElementById('registerLoading');

                // Alternar formulários
                showRegisterLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    loginForm.classList.add('hidden');
                    registerForm.classList.remove('hidden');
                    loginError.textContent = '';
                    registerError.textContent = '';
                });

                showLoginLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    registerForm.classList.add('hidden');
                    loginForm.classList.remove('hidden');
                    loginError.textContent = '';
                    registerError.textContent = '';
                });

                // ── LOGIN ──────────────────────────────────────────────
                loginForm.addEventListener('submit', async function(e) {
                    e.preventDefault();

                    const email = document.getElementById('loginEmail').value.trim();
                    const senha = document.getElementById('loginPassword').value;

                    loginLoading.style.display = 'block';
                    loginError.textContent = '';

                    try {
                        const response = await fetch('https://api.drucciacessorios.pt/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, senha })  // ← campo correcto
                        });

                        const data = await response.json();

                    if (response.ok) {
                        localStorage.setItem('token', data.access_token);

                        // decodificar o token para obter o role
                        const payload = JSON.parse(atob(data.access_token.split('.')[1]));
                        const role = payload.role;

                        localStorage.setItem('user', JSON.stringify({ email, role }));

                        // redirecionar conforme o role
                        if (role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'chat.html';
                        }
                    }
                    } catch (error) {
                        loginError.textContent = 'Erro de conexão com o servidor';
                    } finally {
                        loginLoading.style.display = 'none';
                    }
                });

                // ── REGISTO ────────────────────────────────────────────
                registerForm.addEventListener('submit', async function(e) {
                    e.preventDefault();

                    const nome = document.getElementById('registerName').value.trim();
                    const email = document.getElementById('registerEmail').value.trim();
                    const senha = document.getElementById('registerPassword').value;
                    const confirmar = document.getElementById('registerConfirmPassword').value;
                    const codigo_sala = prompt('Introduz o código da sala fornecido pelo professor:');

                    if (!codigo_sala) {
                        registerError.textContent = 'Código da sala é obrigatório';
                        return;
                    }

                    if (senha !== confirmar) {
                        registerError.textContent = 'As senhas não coincidem';
                        return;
                    }

                    if (senha.length < 6) {
                        registerError.textContent = 'A senha deve ter pelo menos 6 caracteres';
                        return;
                    }

                    registerLoading.style.display = 'block';
                    registerError.textContent = '';

                    try {
                        const response = await fetch('https://api.drucciacessorios.pt/auth/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                nome,           // ← campo correcto
                                email,
                                senha,          // ← campo correcto
                                codigo_sala,    // ← campo correcto
                                role: 'user'
                            })
                        });

                        const data = await response.json();

                        if (response.ok) {
                            registerError.style.color = '#22c55e';
                            registerError.textContent = 'Conta criada! Podes fazer login.';
                            setTimeout(() => {
                                registerForm.classList.add('hidden');
                                loginForm.classList.remove('hidden');
                                registerError.textContent = '';
                                registerError.style.color = '#e74c3c';
                            }, 1500);
                        } else {
                            registerError.textContent = data.detail || 'Erro ao registar';
                        }
                    } catch (error) {
                        registerError.textContent = 'Erro de conexão com o servidor';
                    } finally {
                        registerLoading.style.display = 'none';
                    }
                });
            });
    </script>
</body>
</html>
